<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RGB-11 SCI Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space+Grotesk', sans-serif; background: #050505; color: #eee; overflow-x: hidden; }
        .qr-canvas { filter: drop-shadow(0 0 20px rgba(255,255,255,0.05)); transition: all 0.5s ease; }
        .mode-camera .main-ui { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .viewfinder { border: 2px solid rgba(255,255,255,0.2); transition: all 0.3s; }
        .viewfinder.targeting { border-color: #00ff88; box-shadow: 0 0 30px rgba(0,255,136,0.2); }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }
        .flash-anim { animation: flash 0.4s ease-out forwards; }
        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; background: #fff; } 100% { opacity: 0; } }
        .indicator { width: 8px; height: 8px; border-radius: 50%; background: #222; transition: 0.3s; }
        .active-r { background: #ff4444; box-shadow: 0 0 10px #ff4444; }
        .active-g { background: #44ff44; box-shadow: 0 0 10px #44ff44; }
        .active-b { background: #4444ff; box-shadow: 0 0 10px #4444ff; }
        .dropdown { display: none; }
        .dropdown.show { display: block; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="flash-layer" class="fixed inset-0 z-50 pointer-events-none opacity-0"></div>

    <div class="main-ui fixed top-0 w-full p-6 flex justify-between items-center z-40 transition-all duration-500">
        <div class="text-xl font-bold tracking-tighter">RGB-11 <span class="text-[10px] opacity-40">v2.1 SCI</span></div>
        <div class="relative">
            <button id="menu-btn" class="p-2 opacity-60 hover:opacity-100 transition">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div id="dropdown" class="dropdown absolute right-0 mt-2 w-48 bg-[#111] border border-white/10 rounded-xl overflow-hidden shadow-2xl">
                <button onclick="openModal('usage')" class="w-full p-4 text-left hover:bg-white/5 text-sm" data-i18n="menu_usage">Як користуватися</button>
                <button onclick="openModal('tech')" class="w-full p-4 text-left hover:bg-white/5 text-sm border-t border-white/5" data-i18n="menu_tech">Технологія</button>
                <button onclick="globalReset()" class="w-full p-4 text-left hover:bg-white/5 text-sm border-t border-white/5 text-red-400" data-i18n="menu_reset">Скинути все</button>
            </div>
        </div>
    </div>

    <div id="central-container" class="relative group">
        <canvas id="qr-main" width="512" height="512" class="qr-canvas w-72 h-72 rounded-3xl bg-[#0a0a0a]"></canvas>
        <video id="video" class="absolute inset-0 w-full h-full object-cover rounded-3xl hidden" playsinline></video>
        <canvas id="freeze-frame" class="absolute inset-0 w-full h-full object-cover rounded-3xl hidden"></canvas>
        <div id="viewfinder-ui" class="viewfinder absolute inset-0 rounded-3xl pointer-events-none hidden">
            <div class="absolute top-4 left-4 w-6 h-6 border-t-2 border-l-2 border-white/30"></div>
            <div class="absolute top-4 right-4 w-6 h-6 border-t-2 border-r-2 border-white/30"></div>
            <div class="absolute bottom-4 left-4 w-6 h-6 border-b-2 border-l-2 border-white/30"></div>
            <div class="absolute bottom-4 right-4 w-6 h-6 border-b-2 border-r-2 border-white/30"></div>
        </div>
    </div>

    <div id="result-indicators" class="mt-8 flex gap-6 opacity-0 transition-opacity duration-500">
        <div id="res-r" class="flex items-center gap-2"><div class="indicator"></div><span class="text-[10px] font-medium opacity-50">RED</span></div>
        <div id="res-g" class="flex items-center gap-2"><div class="indicator"></div><span class="text-[10px] font-medium opacity-50">GREEN</span></div>
        <div id="res-b" class="flex items-center gap-2"><div class="indicator"></div><span class="text-[10px] font-medium opacity-50">BLUE</span></div>
    </div>

    <div class="main-ui mt-10 w-full max-w-xs space-y-3 transition-all duration-500">
        <div class="space-y-2">
            <input id="r-text" type="text" placeholder="RED CHANNEL" class="w-full bg-[#111] border border-white/5 p-4 rounded-xl text-sm focus:border-red-500/50 outline-none transition" data-i18n-ph="ph_r">
            <input id="g-text" type="text" placeholder="GREEN CHANNEL" class="w-full bg-[#111] border border-white/5 p-4 rounded-xl text-sm focus:border-green-500/50 outline-none transition" data-i18n-ph="ph_g">
            <input id="b-text" type="text" placeholder="BLUE CHANNEL" class="w-full bg-[#111] border border-white/5 p-4 rounded-xl text-sm focus:border-blue-500/50 outline-none transition" data-i18n-ph="ph_b">
        </div>
        
        <div class="flex gap-2 pt-4">
            <button onclick="startCamera()" class="flex-1 bg-white text-black font-bold p-4 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-200 transition">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span data-i18n="btn_camera">Камера</span>
            </button>
            <button onclick="triggerFileInput()" class="w-14 bg-[#1a1a1a] rounded-xl flex items-center justify-center border border-white/5 hover:bg-white/10 transition">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
        </div>
        <button id="save-btn" onclick="saveQR()" class="hidden w-full text-xs opacity-40 py-2 hover:opacity-100 transition" data-i18n="btn_save">Зберегти PNG</button>
    </div>

    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile(event)">
    <canvas id="mini-qr" width="32" height="32" class="hidden"></canvas>

    <div id="modal-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-all">
        <div class="max-w-md w-full p-8">
            <h2 id="modal-title" class="text-2xl font-bold mb-4"></h2>
            <div id="modal-body" class="text-sm opacity-70 leading-relaxed space-y-4"></div>
            <button onclick="closeModal()" class="mt-8 w-full border border-white/20 p-4 rounded-xl text-xs tracking-widest font-bold" data-i18n="btn_close">ЗАКРИТИ</button>
        </div>
    </div>

    <script>
        const translations = {
            uk: {
                menu_usage: "Як користуватися", menu_tech: "Технологія", menu_reset: "Скинути все",
                btn_save: "Зберегти PNG", btn_camera: "Камера", btn_close: "ЗАКРИТИ",
                ph_r: "RED CHANNEL", ph_g: "GREEN CHANNEL", ph_b: "BLUE CHANNEL",
                res_wait: "Сканування...", res_fail: "[!] Помилка",
                status_no_qr: "НЕ БАЧУ QR-КОД",
                m_usage_title: "📝 Інструкція", 
                m_usage_body: "<p><b>1. Створення:</b> Введіть текст у канали. <b>2. Сканування:</b> Тримайте код у рамці. Рамка пульсує, поки збираються дані.</p>",
                m_tech_title: "⚙️ Технологія SCI", 
                m_tech_body: "<p>Використовується спектральне розділення каналів для зчитування кольорових кодів.</p>"
            }
        };

        const els = {
            r: document.getElementById('r-text'), g: document.getElementById('g-text'), b: document.getElementById('b-text'),
            main: document.getElementById('qr-main'), video: document.getElementById('video'),
            freeze: document.getElementById('freeze-frame'), centralContainer: document.getElementById('central-container'),
            viewfinder: document.getElementById('viewfinder-ui'), flash: document.getElementById('flash-layer'),
            resultIndicators: document.getElementById('result-indicators'),
            resR: document.getElementById('res-r'), resG: document.getElementById('res-g'), resB: document.getElementById('res-b'),
            dropdown: document.getElementById('dropdown'), mini: document.getElementById('mini-qr')
        };

        let scanning = false, isCapturing = false, currentLang = 'uk';
        let sessionBuffer = { r: null, g: null, b: null }, results = { r: null, g: null, b: null };

        const statusLabel = document.createElement('div');
        statusLabel.className = "absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white/40 pointer-events-none uppercase z-20";
        els.centralContainer.appendChild(statusLabel);

        function applyBradley(imgData, chIdx) {
            const w = imgData.width, h = imgData.height, input = imgData.data;
            const output = new Uint8ClampedArray(w * h * 4);
            const intImg = new Int32Array(w * h);
            const s = Math.floor(w / 8), t = 15;
            for (let y = 0; y < h; y++) {
                let sum = 0;
                for (let x = 0; x < w; x++) {
                    sum += input[(y * w + x) * 4 + chIdx];
                    intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
                }
            }
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1), y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                    const count = (x2 - x1) * (y2 - y1), sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                    const res = (input[(y * w + x) * 4 + chIdx] * count < sum * (100 - t) / 100) ? 0 : 255;
                    const idx = (y * w + x) * 4; output[idx] = output[idx+1] = output[idx+2] = res; output[idx+3] = 255;
                }
            }
            return { data: output, width: w, height: h };
        }

        function updateVisualFeedback(count) {
            if (count > 0) {
                els.viewfinder.classList.add('targeting');
                statusLabel.style.opacity = "0";
                els.viewfinder.style.animation = `pulse ${count === 3 ? 0.2 : count === 2 ? 0.6 : 1.2}s infinite`;
            } else {
                els.viewfinder.classList.remove('targeting');
                statusLabel.style.opacity = "1";
                statusLabel.textContent = translations[currentLang].status_no_qr;
                els.viewfinder.style.animation = "none";
            }
        }

        function scanFrame() {
            if (!scanning || isCapturing) return;
            if (els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                const cv = document.createElement('canvas'); cv.width = 480; cv.height = 480;
                const s = Math.min(els.video.videoWidth, els.video.videoHeight);
                const ctx = cv.getContext('2d'); ctx.drawImage(els.video, (els.video.videoWidth-s)/2, (els.video.videoHeight-s)/2, s, s, 0, 0, 480, 480);
                const imgData = ctx.getImageData(0, 0, 480, 480);
                let foundCount = 0;
                ['r', 'g', 'b'].forEach((ch, idx) => {
                    if (sessionBuffer[ch]) { foundCount++; return; }
                    const mono = applyBradley(imgData, idx);
                    const code = jsQR(mono.data, 480, 480);
                    if (code) { sessionBuffer[ch] = code.data; foundCount++; }
                });
                updateVisualFeedback(foundCount);
                if (sessionBuffer.r && sessionBuffer.g && sessionBuffer.b) {
                    isCapturing = true; results = { ...sessionBuffer }; triggerCaptureSequence(); return;
                }
            }
            requestAnimationFrame(scanFrame);
        }

        function triggerCaptureSequence() {
            stopCamera(); els.flash.classList.add('flash-anim');
            setTimeout(() => { els.flash.classList.remove('flash-anim'); updateResultUI(); }, 400);
        }

        function updateResultUI() {
            els.resultIndicators.style.opacity = 1;
            ['r', 'g', 'b'].forEach(ch => {
                const el = els['res' + ch.toUpperCase()];
                if(results[ch]) {
                    el.querySelector('span').textContent = results[ch];
                    el.querySelector('.indicator').className = `indicator active-${ch}`;
                    els[ch].value = results[ch];
                }
            });
            generateQR();
        }

        function generateQR() {
            const texts = [els.r.value, els.g.value, els.b.value];
            if (!texts.some(t => t.trim())) { els.main.style.opacity = 0.1; return; }
            els.main.style.opacity = 1; els.video.classList.add('hidden'); els.viewfinder.classList.add('hidden');
            document.body.classList.remove('mode-camera');
            const ctx = els.main.getContext('2d'); ctx.fillStyle = "#000"; ctx.fillRect(0,0,512,512);
            ctx.globalCompositeOperation = "lighten";
            texts.forEach((text, i) => {
                if(!text.trim()) return;
                const qr = qrcode(0, 'M'); qr.addData(unescape(encodeURIComponent(text))); qr.make();
                const mod = 512 / qr.getModuleCount();
                ctx.fillStyle = i === 0 ? "#F00" : (i === 1 ? "#0F0" : "#00F");
                for (let r = 0; r < qr.getModuleCount(); r++)
                    for (let c = 0; c < qr.getModuleCount(); c++)
                        if (qr.isDark(r, c)) ctx.fillRect(c * mod, r * mod, mod, mod);
            });
            ctx.globalCompositeOperation = "source-over";
            document.getElementById('save-btn').classList.remove('hidden');
        }

        async function startCamera() {
            globalReset(); document.body.classList.add('mode-camera'); els.viewfinder.classList.remove('hidden');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
                els.video.srcObject = s; els.video.play(); els.video.classList.remove('hidden');
                scanning = true; requestAnimationFrame(scanFrame);
            } catch(e) { alert("Camera Error"); }
        }

        function stopCamera() { scanning = false; if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop()); }
        
        function globalReset() {
            stopCamera(); els.r.value = els.g.value = els.b.value = "";
            sessionBuffer = {r:null, g:null, b:null}; results = {r:null, g:null, b:null};
            generateQR(); els.resultIndicators.style.opacity = 0;
            els.video.classList.add('hidden'); els.viewfinder.classList.add('hidden');
            document.body.classList.remove('mode-camera');
        }

        function openModal(t) {
            document.getElementById('modal-title').textContent = translations[currentLang]['m_'+t+'_title'];
            document.getElementById('modal-body').innerHTML = translations[currentLang]['m_'+t+'_body'];
            document.getElementById('modal-overlay').style.opacity = "1";
            document.getElementById('modal-overlay').style.pointerEvents = "auto";
        }
        function closeModal() {
            document.getElementById('modal-overlay').style.opacity = "0";
            document.getElementById('modal-overlay').style.pointerEvents = "none";
        }
        
        function triggerFileInput() { document.getElementById('file-input').click(); }
        function saveQR() { const a = document.createElement('a'); a.download = 'rgb-qr.png'; a.href = els.main.toDataURL(); a.click(); }

        document.getElementById('menu-btn').onclick = (e) => { e.stopPropagation(); els.dropdown.classList.toggle('show'); };
        document.onclick = () => els.dropdown.classList.remove('show');
        [els.r, els.g, els.b].forEach(el => el.addEventListener('input', generateQR));
        generateQR();
    </script>
</body>
</html>
